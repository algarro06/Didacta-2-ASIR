<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
        <title>Didacta</title>
        <link rel="stylesheet" href="login.css">
        <script src="login.js" defer></script>
        <!-- Favicon estándar -->
            <link rel="icon" type="image/png" sizes="16x16" href="Imagenes/logo_didacta.png">
            <link rel="icon" type="image/png" sizes="32x32" href="Imagenes/logo_didacta.png">

        <!-- Apple Touch Icon (iPhone/iPad) -->
            <link rel="apple-touch-icon" sizes="180x180" href="Imagenes/logo_didacta.png">

        <!-- Android / Chrome -->
            <link rel="icon" type="image/png" sizes="192x192" href="Imagenes/logo_didacta.png">
            <link rel="icon" type="image/png" sizes="512x512" href="Imagenes/logo_didacta.png">

        <!-- Para navegadores antiguos -->
            <link rel="shortcut icon" href="Imagenes/logo_didacta.png" type="image/x-icon">
    </head>
    <body>
        <div class="page">
            <div class="login-box">
            <h2>¡Bienvenido!</h2>
            <p>Introduce tus datos para iniciar sesión</p>
            <form>
                <input type="text" placeholder="Usuario" required>
                <input type="password" placeholder="Contraseña" required>
                <button type="submit">Iniciar sesión</button>
            </form>
            </div>
        </div>
    </body>
</html>
